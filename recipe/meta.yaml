{% set name = "neatnet" %}
{% set version = "0.1.6" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/f5/9c/14cc38e097458ab163209d14159d9b1dccaaa73fb25736ea49c1824d225d/neatnet-{{ version }}.tar.gz
  sha256: a1f760e0875a7f42a778d86293c397b37ee61e71fba49769c2b3db30271a7fff

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - esda >=2.6.0
    - geopandas >=1.0.1
    - libpysal >=4.12.1
    - momepy >=0.9.0
    - networkx >=3.3
    - numpy >=1.26.4
    - pandas >=2.2.3
    - scipy >=1.14.1
    - shapely >=2.0.6

test:
  imports:
    - neatnet
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/uscuni/neatnet
  summary: Street geometry processing toolkit
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - martinfleis
    - jGaboardi
    - anastassiavybornova
